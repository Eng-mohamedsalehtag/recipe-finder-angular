<div class="container mt-5">
  <!-- Title -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">🛒 My Cart</h2>

    <button
      class="btn btn-outline-danger"
      (click)="clear()"
      *ngIf="cartItems.length > 0"
    >
      Clear Cart
    </button>
  </div>

  <!-- Empty State -->
  <div *ngIf="cartItems.length === 0" class="text-center empty-cart">
    <h4 class="mb-2">Your cart is empty 😢</h4>
    <p class="text-muted">Go add some delicious food 🍕</p>

    <a routerLink="/main" class="btn btn-primary mt-3"> Browse Menu </a>
  </div>

  <!-- Cart Items -->
  <div class="row g-4" *ngIf="cartItems.length > 0">
    <div class="col-md-6 col-lg-4" *ngFor="let item of cartItems">
      <div class="card cart-card h-100 shadow-sm">
        <img [src]="item.image_url" class="card-img-top" [alt]="item.title" />

        <div class="card-body d-flex flex-column">
          <h6 class="fw-bold mb-2">
            {{ item.title }}
          </h6>

          <p class="text-muted small">
            {{ item.publisher }}
          </p>

          <button class="btn btn-danger mt-auto" (click)="remove(item.id)">
            Remove
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
